[build]
  # This command runs from the repository root
  command = "cd sundaram-new/my-app && npm install && npm run build && cd ../../sundaram-backend && mkdir -p public && cp -R ../sundaram-new/my-app/dist/* public/ && cp -R uploads public/"
  publish = "sundaram-backend/public"
  functions = "sundaram-backend/netlify/functions"

[functions]
  external_node_modules = ["serverless-http", "express", "mongoose", "cors", "helmet", "morgan", "dotenv", "@sentry/node", "bcrypt", "dayjs", "jsonwebtoken", "multer", "nodemailer", "zod"]
  node_bundler = "esbuild"

# Proxy for images
[[redirects]]
  from = "/uploads/*"
  to = "/.netlify/functions/server/uploads/:splat"
  status = 200

# Proxy all API and Auth routes to the Netlify Function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat"
  status = 200

[[redirects]]
  from = "/admin/notifications"
  to = "/.netlify/functions/server/admin/notifications"
  status = 200

[[redirects]]
  from = "/admin/notifications/*"
  to = "/.netlify/functions/server/admin/notifications/:splat"
  status = 200


[[redirects]]
  from = "/admin/notifications"
  to = "/.netlify/functions/server/admin/notifications"
  status = 200

[[redirects]]
  from = "/admin/notifications/*"
  to = "/.netlify/functions/server/admin/notifications/:splat"
  status = 200


[[redirects]]
  from = "/products"
  to = "/.netlify/functions/server/products"
  status = 200

[[redirects]]
  from = "/products/*"
  to = "/.netlify/functions/server/products/:splat"
  status = 200

[[redirects]]
  from = "/auth"
  to = "/.netlify/functions/server/auth"
  status = 200

[[redirects]]
  from = "/auth/*"
  to = "/.netlify/functions/server/auth/:splat"
  status = 200

[[redirects]]
  from = "/categories"
  to = "/.netlify/functions/server/categories"
  status = 200

[[redirects]]
  from = "/categories/*"
  to = "/.netlify/functions/server/categories/:splat"
  status = 200

# Catch-all for React routing (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
